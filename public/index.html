<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Isaac Oppermann is a D1 Penn State athlete, filmmaker, and lifestyle creator helping brands earn attention online."
    />
    <title>Isaac Oppermann</title>
    <link rel="stylesheet" href="/styles.css?v=psu-gradient" />
    <script type="module" src="/main.js?v=creator-proof"></script>
  </head>
  <body>
    <main class="site-shell">
      <nav class="nav" aria-label="Main navigation">
        <a class="brand" data-brand href="/">Isaac Oppermann</a>
        <div class="nav-links">
          <a href="#socials">Platforms</a>
          <a href="#inquiry">Partnerships</a>
        </div>
      </nav>

      <section class="hero">
        <div>
          <p class="eyebrow" data-location></p>
          <h1 data-brand>Isaac Oppermann</h1>
          <p class="lede" data-description></p>
          <div class="actions">
            <a class="button" data-cta href="#inquiry">Work with Isaac</a>
            <a class="button secondary" data-email-link href="mailto:oppermannisaac@gmail.com">
              Email directly
            </a>
          </div>
        </div>

        <aside class="social-panel" id="socials">
          <p class="eyebrow">Platforms</p>
          <h2 data-tagline></h2>
          <div class="social-list" data-socials></div>
        </aside>
      </section>

      <section class="highlights" data-highlights aria-label="Highlights"></section>

      <section class="form-section" id="inquiry">
        <div class="form-copy">
          <p class="eyebrow">Partnership inquiries</p>
          <h2 data-form-title></h2>
          <p data-form-intro></p>
        </div>
        <div class="forms-split">
          <form class="form-card" data-inquiry-form="brand">
            <div class="form-card-header">
              <p class="eyebrow" data-brand-form-label></p>
              <h3 data-brand-form-title></h3>
              <p data-brand-form-intro></p>
            </div>
            <div class="notice" data-form-notice hidden></div>
            <div class="form-grid" data-form-fields></div>
            <button class="button" type="submit" data-form-submit></button>
          </form>

          <form class="form-card" data-inquiry-form="creator">
            <div class="form-card-header">
              <p class="eyebrow" data-creator-form-label></p>
              <h3 data-creator-form-title></h3>
              <p data-creator-form-intro></p>
              <p class="creator-proof" data-creator-form-proof></p>
            </div>
            <div class="notice" data-form-notice hidden></div>
            <div class="form-grid" data-form-fields></div>
            <button class="button" type="submit" data-form-submit></button>
          </form>
        </div>
      </section>

      <footer class="footer">
        <span data-brand>Isaac Oppermann</span>
        <a data-email-text data-email-link href="mailto:oppermannisaac@gmail.com">oppermannisaac@gmail.com</a>
        <a class="footer-admin" href="/admin.html">Admin</a>
      </footer>
    </main>
  </body>
</html>
